name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set rust version in devcontainer
      run: ./scripts/set-rust-version.sh nightly

    - name: Code coverage
      uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
      with:
        runCmd: ./scripts/coverage.sh
